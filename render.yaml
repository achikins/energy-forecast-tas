services:
  - type: web
    name: energy-forecast-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python data/generate_data.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://energy-forecast-tas.vercel.app
    autoDeploy: true
